services:
  postgres:
    image: postgres:16-alpine
    container_name: arishafit-postgres
    environment:
      POSTGRES_DB: arishafit
      POSTGRES_USER: arishafit
      POSTGRES_PASSWORD: arishafit_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arishafit -d arishafit"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: arishafit-api
    environment:
      DATABASE_URL: postgresql://arishafit:arishafit_dev@postgres:5432/arishafit
    ports:
      - "8000:8000"
    volumes:
      # Медиа монтируется как volume — не раздувает образ
      - ./exercisedb_data/mp4_paused:/app/exercisedb_data/mp4_paused:ro
      - ./exercisedb_data/mp4:/app/exercisedb_data/mp4:ro
      - ./exercisedb_data/gifs_hd:/app/exercisedb_data/gifs_hd:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres-data:
