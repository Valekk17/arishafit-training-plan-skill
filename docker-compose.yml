services:
  postgres:
    image: postgres:16-alpine
    container_name: arishafit-postgres
    environment:
      POSTGRES_DB: arishafit
      POSTGRES_USER: arishafit
      POSTGRES_PASSWORD: arishafit_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arishafit -d arishafit"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  postgres-data:
